name: Build sites.json and deploy to Catalyst Slate

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Generate sites.json
        run: node scripts/build-sites-json.js

      - name: Commit sites.json (if changed)
        run: |
          if ! git diff --quiet -- sites.json; then
            git config user.name  "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add sites.json
            git commit -m "chore: regenerate sites.json"
            git push
          else
            echo "sites.json unchanged."
          fi

      - name: Install Catalyst CLI
        run: npm install -g zcatalyst-cli

      - name: Deploy to Catalyst Slate
        env:
          CATALYST_TOKEN: ${{ secrets.CATALYST_TOKEN }}
          CATALYST_PROJECT_ID: ${{ secrets.CATALYST_PROJECT_ID }}
        run: |
          mkdir -p ~/.catalystrc
          echo "$CATALYST_TOKEN" > ~/.catalystrc/credentials.json
          catalyst deploy --only client --non-interactive
