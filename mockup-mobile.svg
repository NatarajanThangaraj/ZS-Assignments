<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 390 844" font-family="Inter, system-ui, sans-serif">
  <defs>
    <filter id="mshadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#0F2A5C" flood-opacity="0.08"/>
    </filter>
    <symbol id="mlogo" viewBox="0 0 40 40">
      <path d="M6 6 L20 6 L20 20 L34 20 L34 34 L20 34 Z" fill="#E63946"/>
      <path d="M14 14 L28 14 L28 28 L14 28 Z" fill="#3B82F6"/>
    </symbol>
    <symbol id="mthumb" viewBox="0 0 100 60">
      <rect width="100" height="60" fill="#E5E7EB"/>
      <circle cx="25" cy="22" r="8" fill="#9CA3AF"/>
      <path d="M0 60 L35 32 L60 48 L100 18 L100 60 Z" fill="#9CA3AF"/>
    </symbol>
  </defs>

  <rect width="390" height="844" fill="#F4F6FA"/>

  <!-- Title strip -->
  <g transform="translate(16,32)">
    <use href="#mlogo" x="0" y="0" width="40" height="40"/>
    <text x="52" y="18" fill="#6B7280" font-size="11" font-weight="500">Zoho Schools</text>
    <text x="52" y="38" fill="#0B1220" font-size="20" font-weight="800">My Assignments</text>
  </g>

  <!-- Search bar -->
  <g transform="translate(16,100)">
    <rect width="280" height="44" rx="12" fill="#fff" stroke="#E5E7EB"/>
    <text x="18" y="28" fill="#9CA3AF" font-size="14">⌕  Search assignments…</text>
    <rect x="290" y="0" width="68" height="44" rx="12" fill="#fff" stroke="#E5E7EB"/>
    <text x="324" y="28" fill="#0B1220" font-size="12" text-anchor="middle">Filters ▾</text>
  </g>

  <!-- Site cards (1-col) -->
  <g transform="translate(16,164)" filter="url(#mshadow)">
    <g>
      <rect width="358" height="128" rx="14" fill="#fff"/>
      <use href="#mthumb" x="12" y="12" width="120" height="104"/>
      <text x="144" y="40" fill="#0B1220" font-size="15" font-weight="700">Portfolio</text>
      <text x="144" y="60" fill="#6B7280" font-size="11">Single-page responsive</text>
      <text x="144" y="74" fill="#6B7280" font-size="11">portfolio with hero + projects.</text>
      <rect x="144" y="86" width="38" height="20" rx="5" fill="#EEF2FF"/>
      <text x="163" y="100" fill="#3B82F6" font-size="10" font-weight="700" text-anchor="middle">HTML</text>
      <rect x="186" y="86" width="34" height="20" rx="5" fill="#EEF2FF"/>
      <text x="203" y="100" fill="#3B82F6" font-size="10" font-weight="700" text-anchor="middle">CSS</text>
      <text x="344" y="108" fill="#E63946" font-size="12" font-weight="700" text-anchor="end">Open →</text>
    </g>
    <g transform="translate(0,140)">
      <rect width="358" height="128" rx="14" fill="#fff"/>
      <use href="#mthumb" x="12" y="12" width="120" height="104"/>
      <text x="144" y="40" fill="#0B1220" font-size="15" font-weight="700">Todo App</text>
      <text x="144" y="60" fill="#6B7280" font-size="11">Vanilla JS todo with</text>
      <text x="144" y="74" fill="#6B7280" font-size="11">localStorage + drag-reorder.</text>
      <rect x="144" y="86" width="26" height="20" rx="5" fill="#EEF2FF"/>
      <text x="157" y="100" fill="#3B82F6" font-size="10" font-weight="700" text-anchor="middle">JS</text>
      <text x="344" y="108" fill="#E63946" font-size="12" font-weight="700" text-anchor="end">Open →</text>
    </g>
    <g transform="translate(0,280)">
      <rect width="358" height="128" rx="14" fill="#fff"/>
      <use href="#mthumb" x="12" y="12" width="120" height="104"/>
      <text x="144" y="40" fill="#0B1220" font-size="15" font-weight="700">Animations</text>
      <text x="144" y="60" fill="#6B7280" font-size="11">CSS keyframes playground —</text>
      <text x="144" y="74" fill="#6B7280" font-size="11">loaders, transitions, easings.</text>
      <rect x="144" y="86" width="34" height="20" rx="5" fill="#EEF2FF"/>
      <text x="161" y="100" fill="#3B82F6" font-size="10" font-weight="700" text-anchor="middle">CSS</text>
      <text x="344" y="108" fill="#E63946" font-size="12" font-weight="700" text-anchor="end">Open →</text>
    </g>
    <g transform="translate(0,420)">
      <rect width="358" height="128" rx="14" fill="#fff"/>
      <use href="#mthumb" x="12" y="12" width="120" height="104"/>
      <text x="144" y="40" fill="#0B1220" font-size="15" font-weight="700">Calculator</text>
      <text x="144" y="60" fill="#6B7280" font-size="11">Keyboard-accessible calculator</text>
      <text x="144" y="74" fill="#6B7280" font-size="11">with full expression parsing.</text>
      <rect x="144" y="86" width="26" height="20" rx="5" fill="#EEF2FF"/>
      <text x="157" y="100" fill="#3B82F6" font-size="10" font-weight="700" text-anchor="middle">JS</text>
      <text x="344" y="108" fill="#E63946" font-size="12" font-weight="700" text-anchor="end">Open →</text>
    </g>
    <g transform="translate(0,560)">
      <rect width="358" height="128" rx="14" fill="#fff"/>
      <use href="#mthumb" x="12" y="12" width="120" height="104"/>
      <text x="144" y="40" fill="#0B1220" font-size="15" font-weight="700">Weather Widget</text>
      <text x="144" y="60" fill="#6B7280" font-size="11">Fetch + render weather card</text>
      <text x="144" y="74" fill="#6B7280" font-size="11">with city search.</text>
      <rect x="144" y="86" width="26" height="20" rx="5" fill="#EEF2FF"/>
      <text x="157" y="100" fill="#3B82F6" font-size="10" font-weight="700" text-anchor="middle">JS</text>
      <rect x="174" y="86" width="36" height="20" rx="5" fill="#EEF2FF"/>
      <text x="192" y="100" fill="#3B82F6" font-size="10" font-weight="700" text-anchor="middle">API</text>
      <text x="344" y="108" fill="#E63946" font-size="12" font-weight="700" text-anchor="end">Open →</text>
