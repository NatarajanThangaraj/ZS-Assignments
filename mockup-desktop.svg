<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 900" font-family="Inter, system-ui, sans-serif">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#0F2A5C" flood-opacity="0.08"/>
    </filter>
    <symbol id="logo" viewBox="0 0 40 40">
      <path d="M6 6 L20 6 L20 20 L34 20 L34 34 L20 34 Z" fill="#E63946"/>
      <path d="M14 14 L28 14 L28 28 L14 28 Z" fill="#3B82F6"/>
    </symbol>
    <symbol id="thumb" viewBox="0 0 100 60">
      <rect width="100" height="60" fill="#E5E7EB"/>
      <circle cx="25" cy="22" r="8" fill="#9CA3AF"/>
      <path d="M0 60 L35 32 L60 48 L100 18 L100 60 Z" fill="#9CA3AF"/>
    </symbol>
  </defs>

  <rect width="1440" height="900" fill="#F4F6FA"/>

  <!-- Title strip -->
  <g transform="translate(120,56)">
    <use href="#logo" x="0" y="0" width="48" height="48"/>
    <text x="64" y="22" fill="#6B7280" font-size="14" font-weight="500">Zoho Schools</text>
    <text x="64" y="46" fill="#0B1220" font-size="26" font-weight="800">My Assignments</text>
  </g>

  <!-- Toolbar -->
  <g transform="translate(120,140)">
    <rect width="900" height="48" rx="12" fill="#fff" stroke="#E5E7EB"/>
    <text x="20" y="30" fill="#9CA3AF" font-size="15">⌕  Search assignments…</text>
    <rect x="920" y="0" width="160" height="48" rx="12" fill="#fff" stroke="#E5E7EB"/>
    <text x="940" y="30" fill="#0B1220" font-size="15">All tags  ▾</text>
    <rect x="1200" y="0" width="120" height="48" rx="12" fill="#0F2A5C"/>
    <text x="1260" y="30" fill="#fff" font-size="15" text-anchor="middle" font-weight="700">⊞   ⊟</text>
  </g>

  <!-- Assignment grid -->
  <g transform="translate(120,222)" filter="url(#shadow)">
    <!-- Row 1 -->
    <g>
      <rect width="300" height="300" rx="16" fill="#fff"/>
      <use href="#thumb" x="16" y="16" width="268" height="160"/>
      <text x="22" y="208" fill="#0B1220" font-size="18" font-weight="700">Portfolio</text>
      <text x="22" y="234" fill="#6B7280" font-size="13">Single-page responsive portfolio</text>
      <text x="22" y="252" fill="#6B7280" font-size="13">with hero, projects, contact.</text>
      <rect x="22" y="266" width="46" height="22" rx="6" fill="#EEF2FF"/>
      <text x="45" y="282" fill="#3B82F6" font-size="11" font-weight="700" text-anchor="middle">HTML</text>
      <rect x="74" y="266" width="40" height="22" rx="6" fill="#EEF2FF"/>
      <text x="94" y="282" fill="#3B82F6" font-size="11" font-weight="700" text-anchor="middle">CSS</text>
      <text x="278" y="282" fill="#E63946" font-size="13" font-weight="700" text-anchor="end">Open →</text>
    </g>
    <g transform="translate(320,0)">
      <rect width="300" height="300" rx="16" fill="#fff"/>
      <use href="#thumb" x="16" y="16" width="268" height="160"/>
      <text x="22" y="208" fill="#0B1220" font-size="18" font-weight="700">Todo App</text>
      <text x="22" y="234" fill="#6B7280" font-size="13">Vanilla JS todo with localStorage</text>
      <text x="22" y="252" fill="#6B7280" font-size="13">and drag-reorder.</text>
      <rect x="22" y="266" width="34" height="22" rx="6" fill="#EEF2FF"/>
      <text x="39" y="282" fill="#3B82F6" font-size="11" font-weight="700" text-anchor="middle">JS</text>
      <text x="278" y="282" fill="#E63946" font-size="13" font-weight="700" text-anchor="end">Open →</text>
    </g>
    <g transform="translate(640,0)">
      <rect width="300" height="300" rx="16" fill="#fff"/>
      <use href="#thumb" x="16" y="16" width="268" height="160"/>
      <text x="22" y="208" fill="#0B1220" font-size="18" font-weight="700">Animations</text>
      <text x="22" y="234" fill="#6B7280" font-size="13">CSS keyframes playground —</text>
      <text x="22" y="252" fill="#6B7280" font-size="13">loaders, transitions, easings.</text>
      <rect x="22" y="266" width="40" height="22" rx="6" fill="#EEF2FF"/>
      <text x="42" y="282" fill="#3B82F6" font-size="11" font-weight="700" text-anchor="middle">CSS</text>
      <text x="278" y="282" fill="#E63946" font-size="13" font-weight="700" text-anchor="end">Open →</text>
    </g>
    <g transform="translate(960,0)">
      <rect width="300" height="300" rx="16" fill="#fff"/>
      <use href="#thumb" x="16" y="16" width="268" height="160"/>
      <text x="22" y="208" fill="#0B1220" font-size="18" font-weight="700">Calculator</text>
      <text x="22" y="234" fill="#6B7280" font-size="13">Keyboard-accessible calculator</text>
      <text x="22" y="252" fill="#6B7280" font-size="13">with full expression parsing.</text>
      <rect x="22" y="266" width="34" height="22" rx="6" fill="#EEF2FF"/>
      <text x="39" y="282" fill="#3B82F6" font-size="11" font-weight="700" text-anchor="middle">JS</text>
      <text x="278" y="282" fill="#E63946" font-size="13" font-weight="700" text-anchor="end">Open →</text>
    </g>
    <!-- Row 2 -->
    <g transform="translate(0,320)">
      <rect width="300" height="300" rx="16" fill="#fff"/>
      <use href="#thumb" x="16" y="16" width="268" height="160"/>
      <text x="22" y="208" fill="#0B1220" font-size="18" font-weight="700">Weather Widget</text>
      <text x="22" y="234" fill="#6B7280" font-size="13">Fetch + render weather card</text>
      <text x="22" y="252" fill="#6B7280" font-size="13">with city search.</text>
      <rect x="22" y="266" width="34" height="22" rx="6" fill="#EEF2FF"/>
      <text x="39" y="282" fill="#3B82F6" font-size="11" font-weight="700" text-anchor="middle">JS</text>
      <rect x="62" y="266" width="46" height="22" rx="6" fill="#EEF2FF"/>
      <text x="85" y="282" fill="#3B82F6" font-size="11" font-weight="700" text-anchor="middle">API</text>
      <text x="278" y="282" fill="#E63946" font-size="13" font-weight="700" text-anchor="end">Open →</text>
    </g>
    <g transform="translate(320,320)">
      <rect width="300" height="300" rx="16" fill="#fff"/>
      <use href="#thumb" x="16" y="16" width="268" height="160"/>
      <text x="22" y="208" fill="#0B1220" font-size="18" font-weight="700">Quiz App</text>
      <text x="22" y="234" fill="#6B7280" font-size="13">Multiple-choice quiz with</text>
      <text x="22" y="252" fill="#6B7280" font-size="13">scoring + review.</text>
      <rect x="22" y="266" width="34" height="22" rx="6" fill="#EEF2FF"/>
      <text x="39" y="282" fill="#3B82F6" font-size="11" font-weight="700" text-anchor="middle">JS</text>
      <text x="278" y="282" fill="#E63946" font-size="13" font-weight="700" text-anchor="end">Open →</text>
    </g>
    <g transform="translate(640,320)">
      <rect width="300" height="300" rx="16" fill="#fff"/>
      <use href="#thumb" x="16" y="16" width="268" height="160"/>
      <text x="22" y="208" fill="#0B1220" font-size="18" font-weight="700">Form Validation</text>
      <text x="22" y="234" fill="#6B7280" font-size="13">Inline validation with custom</text>
      <text x="22" y="252" fill="#6B7280" font-size="13">error messages.</text>
      <rect x="22" y="266" width="34" height="22" rx="6" fill="#EEF2FF"/>
      <text x="39" y="282" fill="#3B82F6" font-size="11" font-weight="700" text-anchor="middle">JS</text>
      <text x="278" y="282" fill="#E63946" font-size="13" font-weight="700" text-anchor="end">Open →</text>
    </g>
    <g transform="translate(960,320)">
      <rect width="300" height="300" rx="16" fill="#fff"/>
      <use href="#thumb" x="16" y="16" width="268" height="160"/>
      <text x="22" y="208" fill="#0B1220" font-size="18" font-weight="700">Landing Page</text>
      <text x="22" y="234" fill="#6B7280" font-size="13">Marketing landing with hero,</text>
      <text x="22" y="252" fill="#6B7280" font-size="13">features, pricing.</text>
      <rect x="22" y="266" width="46" height="22" rx="6" fill="#EEF2FF"/>
      <text x="45" y="282" fill="#3B82F6" font-size="11" font-weight="700" text-anchor="middle">HTML</text>
      <rect x="74" y="266" width="40" height="22" rx="6" fill="#EEF2FF"/>
      <text x="94" y="282" fill="#3B82F6" font-size="11" font-weight="700" text-anchor="middle">CSS</text>
      <text x="278" y="282" fill="#E63946" font-size="13" font-weight="700" text-anchor="end">Open →</text>
    </g>
  </g>
</svg>
